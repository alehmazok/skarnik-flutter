name: Deploy Android (Internal track)

on:
  workflow_dispatch:

jobs:
  deploy_internal:
    name: Build appbundle and upload to Play Store Internal track
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: play-internal

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: android

      - name: Restore keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/skarnik.keystore

      - name: Restore key.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=../skarnik.keystore
          EOF

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Restore Play Store service account json
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
        run: echo "$PLAY_STORE_JSON_KEY" > android/api-5250772048485758345-30841-b098f9171bbe.json

      - name: Restore .env.secret
        env:
          ANDROID_ENV_SECRET: ${{ secrets.ANDROID_ENV_SECRET }}
        run: echo "$ANDROID_ENV_SECRET" > android/fastlane/.env.secret

      - run: flutter pub get

      - name: Build and deploy via fastlane
        working-directory: android
        run: bundle exec fastlane appbundle && bundle exec fastlane playstore_internal
