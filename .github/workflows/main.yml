name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  flutter_test:
    name: Run flutter analyze, codegen check and test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Verify generated code is up to date
        run: |
          dart run build_runner build --delete-conflicting-outputs
          git diff --exit-code -- lib/di.skarnik.config.dart lib/objectbox.g.dart lib/serializers.g.dart lib/features/translation/data/model/api_word_model.g.dart || \
            (echo "::error::Generated files out of date. Run 'dart run build_runner build --delete-conflicting-outputs' and commit." && exit 1)

      - run: flutter analyze --no-fatal-infos
      - run: flutter test
